name: Docs to PDF
# This workflow is triggered on pushes to the repository.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    # Paths can be used to only trigger actions when you have edited certain files, such as a file within the /docs directory
    paths:
      - '**.md'
      - 'images/**'

jobs:
  converttopdf:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Markdown to PDF
        run: |
          mkdir -p output
          echo; echo "Input Folder Listing"
          ls
          echo; echo "Generating PDF"
          npx md-to-pdf README.md --stylesheet theme/styles.css > output/marco-ferretti-cv.pdf
          echo; echo "Output Folder Listing"
          ls ./output

      - uses: actions/upload-artifact@v3
        with:
          name: marco-ferretti-cv.pdf
          path: output/marco-ferretti-cv.pdf
